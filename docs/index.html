<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UX AI Toolkit</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230F62FE'/><text x='6' y='23' font-size='20' fill='white'>✦</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* ─── Tokens ─────────────────────────────────────────── */
    :root {
      --theme-color:       #0F62FE;
      --sidebar-bg:        #161616;
      --sidebar-text:      #c6c6c6;
      --sidebar-heading:   #6f6f6f;
      --sidebar-active:    #ffffff;
      --sidebar-active-bg: #0F62FE;
      --sidebar-hover:     #e0e0e0;
      --sidebar-width:     260px;
      --topbar-height:     48px;
      --font-sans:         'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:         'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
      --border:            #e0e0e0;
      --text-primary:      #161616;
      --text-secondary:    #525252;
      --surface:           #f4f4f4;
    }

    /* ─── Google Fonts ───────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

    /* ─── Reset & Base ───────────────────────────────────── */
    * { box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      color: var(--text-primary);
    }

    /* ─── Sidebar ────────────────────────────────────────── */
    .sidebar {
      background: var(--sidebar-bg);
      border-right: none;
      padding-top: 0;
    }

    .sidebar-nav {
      padding: 0 0 40px 0;
    }

    /* Wordmark at top of sidebar */
    .app-name {
      background: var(--sidebar-bg);
      border-bottom: 1px solid #393939;
      padding: 0 24px;
      height: var(--topbar-height);
      display: flex;
      align-items: center;
    }

    .app-name-link {
      color: #ffffff !important;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0;
      text-decoration: none !important;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-name-link::before {
      content: '✦';
      display: inline-block;
      font-size: 16px;
      color: var(--theme-color);
    }

    /* Version badge */
    .app-name-link::after {
      content: 'v0.1';
      font-size: 10px;
      font-weight: 500;
      background: #393939;
      color: #a8a8a8;
      padding: 2px 6px;
      border-radius: 2px;
      margin-left: 6px;
      letter-spacing: 0.02em;
    }

    /* Sidebar section headings (p > strong pattern from Docsify) */
    .sidebar-nav > ul > li > p {
      margin: 24px 0 4px 0;
      padding: 0 24px;
    }

    .sidebar-nav > ul > li > p strong {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sidebar-heading);
      display: block;
    }

    /* Sidebar links */
    .sidebar-nav ul li a {
      color: var(--sidebar-text);
      font-size: 14px;
      font-weight: 400;
      padding: 6px 24px;
      display: block;
      border-radius: 0;
      transition: background 80ms, color 80ms;
      text-decoration: none;
      line-height: 1.4;
    }

    .sidebar-nav ul li a:hover {
      color: var(--sidebar-hover);
      background: #262626;
      text-decoration: none;
    }

    .sidebar-nav ul li.active > a {
      color: var(--sidebar-active);
      background: var(--sidebar-active-bg);
      font-weight: 500;
    }

    /* Nested sidebar items */
    .sidebar-nav ul ul li a {
      padding-left: 40px;
      font-size: 13px;
    }

    /* ─── Content area ───────────────────────────────────── */
    .content {
      padding-top: 0;
    }

    .markdown-section {
      max-width: 860px;
      padding: 48px 48px 96px;
    }

    /* ─── Typography ─────────────────────────────────────── */
    .markdown-section h1 {
      font-size: 32px;
      font-weight: 300;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 24px;
      letter-spacing: -0.01em;
    }

    .markdown-section h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 48px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .markdown-section h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 32px;
      margin-bottom: 12px;
    }

    .markdown-section p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .markdown-section a {
      color: var(--theme-color);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 100ms;
    }

    .markdown-section a:hover {
      border-bottom-color: var(--theme-color);
    }

    /* ─── Tables ─────────────────────────────────────────── */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      margin: 24px 0;
      font-size: 14px;
    }

    .markdown-section thead th {
      background: var(--sidebar-bg);
      color: #f4f4f4;
      padding: 10px 16px;
      text-align: left;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .markdown-section tbody tr {
      border-bottom: 1px solid var(--border);
    }

    .markdown-section tbody tr:last-child {
      border-bottom: 2px solid var(--sidebar-bg);
    }

    .markdown-section tbody td {
      padding: 10px 16px;
      vertical-align: top;
    }

    .markdown-section tbody tr:hover {
      background: var(--surface);
    }

    /* ─── Code ───────────────────────────────────────────── */
    .markdown-section code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 2px;
      color: #e53935;
    }

    .markdown-section pre {
      background: #1e1e1e;
      border-radius: 4px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 24px 0;
    }

    .markdown-section pre code {
      background: none;
      border: none;
      padding: 0;
      color: #d4d4d4;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ─── Blockquotes ────────────────────────────────────── */
    .markdown-section blockquote {
      background: #edf5ff;
      border-left: 4px solid var(--theme-color);
      margin: 24px 0;
      padding: 16px 20px;
      border-radius: 0 4px 4px 0;
    }

    .markdown-section blockquote p {
      margin: 0;
      color: #0043ce;
      font-size: 14px;
    }

    /* ─── Lists ──────────────────────────────────────────── */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 24px;
      margin-bottom: 16px;
    }

    .markdown-section li {
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 4px;
    }

    .markdown-section li input[type="checkbox"] {
      margin-right: 8px;
    }

    /* ─── Homepage cards ─────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin: 32px 0;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      transition: box-shadow 120ms, border-color 120ms;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      border-color: var(--theme-color);
      text-decoration: none;
    }

    .card-icon {
      font-size: 24px;
      margin-bottom: 12px;
      display: block;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 8px;
    }

    .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0;
    }

    /* ─── Callout boxes ──────────────────────────────────── */
    .callout {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      margin: 24px 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .callout-title {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    /* ─── Search ─────────────────────────────────────────── */
    .search {
      background: var(--sidebar-bg);
      border-bottom: 1px solid #393939;
      padding: 12px 16px;
      margin-bottom: 0;
    }

    .search input {
      background: #262626;
      border: 1px solid #393939;
      color: #f4f4f4;
      border-radius: 2px;
      font-size: 13px;
      padding: 8px 12px;
      width: 100%;
      font-family: var(--font-sans);
    }

    .search input::placeholder {
      color: #6f6f6f;
    }

    .search input:focus {
      outline: 2px solid var(--theme-color);
      border-color: transparent;
    }

    /* ─── GitHub corner ──────────────────────────────────── */
    .github-corner svg {
      fill: var(--theme-color);
      color: #fff;
    }

    /* ─── Scrollbar ──────────────────────────────────────── */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: var(--sidebar-bg); }
    .sidebar::-webkit-scrollbar-thumb { background: #393939; border-radius: 2px; }

    /* ─── Responsive ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 24px 20px 60px;
      }
    }
  </style>
</head>
<body>
  <div id="app">Loading…</div>

  <script>
    window.$docsify = {
      name: 'UX AI Toolkit',
      repo: 'https://github.com/ds-danielela/ux-ai-toolkit',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs…',
        noData: 'No results.',
        depth: 4,
      },

      plugins: [
        function(hook) {
          hook.beforeEach(function(content) {
            return content;
          });
        }
      ]
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
